        - heading "Why smooth scroll?" [level=2] [ref=e64]:
          - generic "Why smooth scroll?" [ref=e65]:
            - generic [ref=e67]: Why
            - generic [ref=e69]: smooth
            - generic [ref=e71]: scroll?
        - complementary [ref=e72]:
          - paragraph [ref=e74]: We’ve heard all the reasons to not use smooth scroll. It feels hacky. It’s inaccessible. It’s not performant. It’s over-engineered. And historically, those were all true. But we like to imagine things as they could be, then build them. So, why should you use smooth scroll?
          - generic [ref=e75]:
            - heading "Create more immersive interfaces" [level=3] [ref=e76]
            - paragraph [ref=e77]: Unlock the creative potential and impact of your web experiences. Smoothing the scroll pulls users into the flow of the experience that feels so substantial that they forget they’re navigating a web page.
          - generic [ref=e78]:
            - heading "Normalize all your user inputs" [level=3] [ref=e79]
            - paragraph [ref=e80]: Give all your users the same (dope) experience whether they’re using trackpads, mouse wheels, or otherwise. With smooth scroll, you control how silky, heavy, or responsive the experience should be — no matter the input. Magic!
          - generic [ref=e81]:
            - heading "Make your animations flawless" [level=3] [ref=e82]
            - paragraph [ref=e83]: Synchronization with native scroll is not reliable. Those jumps and delays with scroll-linked animations are caused by multi-threading, where modern browsers run animations/effects asynchronously with the scroll. Smooth scroll fixes this.
