      - heading "Why smooth scroll?" [level=2] [ref=e57]
      - complementary [ref=e58]:
        - paragraph [ref=e60]: We’ve heard all the reasons to not use smooth scroll. It feels hacky. It’s inaccessible. It’s not performant. It’s over-engineered. And historically, those were all true. But we like to imagine things as they could be, then build them. So, why should you use smooth scroll?
        - generic [ref=e61]:
          - heading "Create more immersive interfaces" [level=3] [ref=e62]
          - paragraph [ref=e63]: Unlock the creative potential and impact of your web experiences. Smoothing the scroll pulls users into the flow of the experience that feels so substantial that they forget they’re navigating a web page.
        - generic [ref=e64]:
          - heading "Normalize all your user inputs" [level=3] [ref=e65]
          - paragraph [ref=e66]: Give all your users the same (dope) experience whether they’re using trackpads, mouse wheels, or otherwise. With smooth scroll, you control how silky, heavy, or responsive the experience should be — no matter the input. Magic!
        - generic [ref=e67]:
          - heading "Make your animations flawless" [level=3] [ref=e68]
          - paragraph [ref=e69]: Synchronization with native scroll is not reliable. Those jumps and delays with scroll-linked animations are caused by multi-threading, where modern browsers run animations/effects asynchronously with the scroll. Smooth scroll fixes this.
