            - text: Back in 2012, we were given a full carte-blanche from Google’s Lab team. It was the beginning of what today we call Google Assistant and the guys at Google wanted us to explore how a potential visual and kinetic language could be created and implemented. A Design and Motion exploratory exercise that served as a proof of concept for the in-house team at Google Lab.
