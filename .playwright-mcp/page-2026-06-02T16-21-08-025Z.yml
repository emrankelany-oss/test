            - heading "Our New Us!" [level=2]
            - paragraph: Almost 15 years in the making, and we're just getting started! Our entire internal creative team, alongside some of our most beloved collaborators, joined forces with Clim to align the Studio’s identity with the impact, energy, and growth that define us. We felt the need not only for a fresher, more modern look but also for a truer representation of who we are and where we’re headed.
            - paragraph
            - paragraph: "After taking a deep look in, out, and around—defining our mission, vision, and more—our new identity is stronger than ever: visually bold, recognizable, flexible, and strategically streamlined. This rebrand covers everything: a new logo, a refreshed color palette, a flexible social graphic language, and a revamp of both internal and external communication."
            - paragraph
            - paragraph: To showcase it all, our rebrand film captures the essence of our transformation. With the mantra "we are more powerful together" at its core, this 40-second animation unveils an identity full of joy, brightness, and sophistication, finally speaking the language of mixed media. By blending the power of 2D motion with the tactility and realism of 3D, we feel truly represented.
            - paragraph
            - paragraph: After years of amazing projects and growing into a full-blown creative studio, we decided it was time for a refresh. Clim just turned 40... and maybe this rebrand is his way of handling a midlife crisis. No shiny Porsche needed—just a bold, powerful new look! 😎
